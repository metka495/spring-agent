# 开发环境配置
server:
  port: 8080

spring:
  ai:
    dashscope:
      # 请在这里配置你的智谱 API Key
      # 获取方式: https://open.bigmodel.cn/usercenter/apikeys
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: glm-4-flash
          temperature: 0.7

logging:
  level:
    root: INFO
    com.example.agent: DEBUG
