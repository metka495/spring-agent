server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: spring-ai-agent

  # Spring AI Zhipu AI 配置 (智谱官方)
  ai:
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY:}
      chat:
        options:
          model: glm-4-flash
          temperature: 0.7

  # Agent Chat UI 配置
  ai.alibaba.agent:
    enabled: true

# 日志配置
logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.ai.zhipuai: DEBUG
    com.alibaba.cloud.ai: DEBUG
    com.example.agent: DEBUG
